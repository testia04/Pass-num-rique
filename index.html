  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');

  :root {
    --bg: #F5F1EA;
    --bg-soft: #EDE7DC;
    --surface: #FFFFFF;
    --ink: #181715;
    --ink-soft: #5A554E;
    --muted: #9A9389;
    --line: #1817151A;
    --line-strong: #18171533;
    --accent: #D63B1F;
    --accent-soft: #F2DBD3;
    --success: #2F5D4A;
    --success-soft: #D5E3DC;
    --warning: #B87B0A;
    --warning-soft: #F4E5C7;
  }

  .pn-root, .pn-root * { box-sizing: border-box; }
  .pn-root {
    font-family: 'Geist', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .pn-serif { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.01em; }
  .pn-mono  { font-family: 'Geist Mono', monospace; }

  .pn-grain {
    position: fixed; inset: 0; pointer-events: none; opacity: 0.35; mix-blend-mode: multiply; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.18'/%3E%3C/svg%3E");
  }

  .pn-btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: 'Geist Mono', monospace; font-size: 0.78rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0.95rem 1.5rem; border: 1px solid var(--ink); background: var(--ink); color: var(--bg);
    cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .pn-btn:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--ink); }
  .pn-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .pn-btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pn-btn-accent:hover { box-shadow: 4px 4px 0 var(--accent); }
  .pn-btn-ghost { background: transparent; color: var(--ink); }
  .pn-btn-ghost:hover { box-shadow: 4px 4px 0 var(--ink); background: var(--bg-soft); }

  .pn-input {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--ink);
    padding: 0.75rem 0; font-family: 'Instrument Serif', serif; font-size: 1.75rem;
    color: var(--ink); outline: none;
  }
  .pn-input::placeholder { color: var(--muted); font-style: italic; }
  .pn-input:focus { border-bottom-color: var(--accent); }

  .pn-card {
    background: var(--surface); border: 1px solid var(--ink); transition: all 0.2s ease;
    position: relative;
  }
  .pn-card-hover:hover { transform: translate(-3px, -3px); box-shadow: 6px 6px 0 var(--ink); }
  .pn-card-locked { background: var(--bg-soft); opacity: 0.65; }
  .pn-card-done { background: var(--success-soft); border-color: var(--success); }

  .pn-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-family: 'Geist Mono', monospace; font-size: 0.68rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.3rem 0.6rem; border: 1px solid currentColor;
  }

  .pn-progress-track { height: 2px; background: var(--line-strong); position: relative; overflow: hidden; }
  .pn-progress-fill { height: 100%; background: var(--accent); transition: width 0.6s cubic-bezier(.2,.8,.2,1); }

  .pn-option {
    display: block; width: 100%; text-align: left;
    background: var(--surface); border: 1px solid var(--line-strong);
    padding: 1rem 1.25rem; font-family: 'Geist', sans-serif; font-size: 0.95rem;
    color: var(--ink); cursor: pointer; transition: all 0.15s ease;
    line-height: 1.5;
  }
  .pn-option:hover { border-color: var(--ink); background: var(--bg-soft); }
  .pn-option.selected { border-color: var(--ink); background: var(--ink); color: var(--bg); }
  .pn-option.correct { border-color: var(--success); background: var(--success-soft); color: var(--ink); }
  .pn-option.incorrect { border-color: var(--accent); background: var(--accent-soft); color: var(--ink); }
  .pn-option:disabled { cursor: default; }

  .pn-chip {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--surface); border: 1px solid var(--line-strong);
    padding: 0.55rem 0.85rem; font-size: 0.85rem; cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
  }
  .pn-chip:hover { border-color: var(--ink); }
  .pn-chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .pn-mail {
    background: var(--surface); border: 1px solid var(--line-strong); padding: 1.2rem;
    cursor: pointer; transition: all 0.15s ease;
  }
  .pn-mail:hover { border-color: var(--ink); }
  .pn-mail.flagged-bad { background: var(--accent-soft); border-color: var(--accent); }
  .pn-mail.flagged-good { background: var(--success-soft); border-color: var(--success); }

  .pn-section-num {
    font-family: 'Geist Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
  }

  .pn-fade-in { animation: pn-fade 0.5s ease both; }
  @keyframes pn-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .pn-stamp {
    display: inline-block; padding: 0.5rem 1rem;
    border: 2px solid var(--success); color: var(--success);
    font-family: 'Geist Mono', monospace; font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    transform: rotate(-3deg);
  }

  .pn-divider { height: 1px; background: var(--line-strong); border: none; margin: 0; }

  .pn-strength-bar { height: 4px; background: var(--line-strong); position: relative; }
  .pn-strength-fill { height: 100%; transition: width 0.3s ease, background 0.3s ease; }
`,up={id:1,title:"Sécurité informatique",subtitle:"Bases & réflexes",icon:xc,goal:"Comprendre les risques du quotidien",topics:[{label:"Phishing & mails frauduleux",icon:rp},{label:"Pièces jointes dangereuses",icon:$o},{label:"Réseaux Wi-Fi publics",icon:kc},{label:"Bons réflexes en cas de doute",icon:lr}],lesson:[{h:"Le phishing en 4 indices",p:"Un mail frauduleux se reconnaît souvent à : une adresse expéditeur étrange, un sentiment d'urgence, des fautes ou tournures bizarres, et un lien qui ne mène pas où il prétend. Survolez toujours un lien avant de cliquer."},{h:"Pièces jointes",p:"Méfiez-vous des extensions inhabituelles (.exe, .scr, .iso, .zip protégé). Un document Office qui demande d'« activer les macros » est un signal très fort. En cas de doute, ne cliquez pas — signalez."},{h:"Wi-Fi publics",p:"Sur un réseau ouvert (gare, hôtel, café), partez du principe que le trafic peut être intercepté. Utilisez le VPN d'entreprise pour tout accès professionnel, ou votre partage de connexion mobile."}],workshop:{type:"mixed",intro:"Vous arrivez au bureau lundi matin. Voici votre boîte mail. Identifiez les messages frauduleux, puis répondez aux situations qui suivent.",questions:[{type:"mailbox",prompt:"Sélectionnez tous les messages que vous considérez comme frauduleux.",items:[{id:"m1",from:"rh@sdis04.fr",subject:"Note de service — congés d'été",preview:"Bonjour, vous trouverez ci-joint la note concernant la prise de congés…",bad:!1},{id:"m2",from:"service-paie@sdis04.fr",subject:"URGENT : votre bulletin de paie est bloqué",preview:"Cliquez ici dans les 24h pour débloquer votre virement de salaire…",bad:!0},{id:"m3",from:"no-reply@dropbox-share.support",subject:"Marc a partagé un document avec vous",preview:"Activez les macros pour visualiser le fichier sécurisé.",bad:!0},{id:"m4",from:"adupont@sdis04.fr",subject:"Re : compte-rendu réunion produit",preview:"Hello, je t'envoie mes notes de la réunion d'hier comme convenu.",bad:!1},{id:"m5",from:"ceo.directpay@gmail.com",subject:"Mission confidentielle — réponds vite",preview:"Je suis en réunion, j'ai besoin que tu achètes 5 cartes cadeaux pour un agent. Je te rembourse.",bad:!0}]},{type:"single",prompt:"Vous recevez un SMS de « votre banque » avec un lien vers une page de vérification. Que faites-vous ?",options:[{t:"Je clique pour vérifier rapidement avant que mon compte ne soit bloqué.",correct:!1},{t:"Je n'utilise pas le lien. J'ouvre l'application officielle de ma banque ou je l'appelle directement.",correct:!0},{t:"Je transfère le SMS à un collègue pour avoir son avis.",correct:!1},{t:"Je réponds au SMS pour demander qui m'écrit.",correct:!1}]},{type:"single",prompt:"Vous êtes en gare, vous devez consulter un document professionnel. Quelle option choisissez-vous ?",options:[{t:"Je me connecte au Wi-Fi gratuit de la gare et je consulte normalement.",correct:!1},{t:"Je passe par mon partage de connexion mobile, ou j'active le VPN d'entreprise.",correct:!0},{t:"Je demande le mot de passe Wi-Fi à un voyageur à côté de moi.",correct:!1},{t:"J'attends d'être à l'hôtel pour utiliser leur Wi-Fi.",correct:!1}]}]}},ap={id:2,title:"Bonnes pratiques numériques",subtitle:"Mots de passe, MFA & quotidien",icon:tu,goal:"Adopter les bons réflexes au quotidien",topics:[{label:"Verrouillage de session",icon:Ho},{label:"Partage sécurisé de fichiers",icon:$o},{label:"Télétravail & déplacements",icon:kc},{label:"Mots de passe & MFA",icon:tu},{label:"Supports amovibles",icon:op}],lesson:[{h:"Le réflexe Win+L (ou Ctrl+Cmd+Q sur Mac)",p:"Vous quittez votre poste, même 30 secondes ? Verrouillez votre session. C'est le geste le plus simple et le plus efficace pour protéger ce qui est ouvert sur votre écran."},{h:"Mot de passe : longueur > complexité",p:"Un mot de passe long et mémorisable (phrase de passe) bat un mot de passe court et tordu. Visez 14 caractères minimum, mélangez majuscules, chiffres et symboles, et n'utilisez jamais le même partout."},{h:"MFA & gestionnaire",p:"Activez l'authentification multifacteur (MFA) partout où c'est possible : même si votre mot de passe fuite, l'attaquant est bloqué. Stockez vos identifiants dans le gestionnaire de mots de passe officiel — pas dans un fichier Excel ni sur un Post-it."},{h:"Supports amovibles",p:"Une clé USB trouvée se signale, ne se branche jamais. Pour échanger des fichiers en interne, privilégiez les outils internes validés (espaces de partage, lien chiffré)."}],workshop:{type:"mixed",intro:"Trois scénarios + un atelier mot de passe. Choisissez à chaque fois la bonne réaction.",questions:[{type:"single",prompt:"Open space — vous partez en pause de 10 minutes. Que faites-vous ?",options:[{t:"Je laisse ma session ouverte, je reviens vite.",correct:!1},{t:"Je verrouille ma session (Win+L / Ctrl+Cmd+Q).",correct:!0},{t:"Je demande à un collègue de surveiller mon écran.",correct:!1},{t:"J'éteins complètement l'ordinateur.",correct:!1}]},{type:"single",prompt:"Télétravail dans un café. Vous devez ouvrir un fichier agent confidentiel. Quel comportement adopter ?",options:[{t:"J'ouvre le fichier sur la grande table partagée, ça va vite.",correct:!1},{t:"Je me place dos au mur, j'utilise un filtre de confidentialité, et je passe par le VPN.",correct:!0},{t:"J'imprime le fichier au passage chez le copy-shop.",correct:!1},{t:"Je copie le fichier sur ma clé USB personnelle pour aller plus vite.",correct:!1}]},{type:"single",prompt:"Sur le parking de l'entreprise, vous trouvez une clé USB marquée « Salaires 2025 ». Que faites-vous ?",options:[{t:"Je la branche sur mon poste pour identifier le propriétaire.",correct:!1},{t:"Je la branche sur un poste isolé pour vérifier le contenu.",correct:!1},{t:"Je la dépose ou je la signale au SIC 04, sans la brancher.",correct:!0},{t:"Je la jette à la poubelle.",correct:!1}]},{type:"password",prompt:"Créez un mot de passe robuste. Visez au moins 14 caractères, avec majuscule, chiffre et symbole."},{type:"single",prompt:"À quoi sert principalement l'authentification multifacteur (MFA) ?",options:[{t:"À remplacer le mot de passe.",correct:!1},{t:"À ajouter une seconde preuve d'identité, pour qu'un mot de passe volé ne suffise pas.",correct:!0},{t:"À chiffrer les fichiers sur le poste.",correct:!1},{t:"À sauvegarder les mots de passe dans le cloud.",correct:!1}]}]}},cp={id:3,title:"Usage de l'IA en entreprise",subtitle:"Bénéfices & garde-fous",icon:tp,goal:"Encadrer les usages de l'intelligence artificielle",topics:[{label:"Usages possibles (rédaction, synthèse, code)",icon:ip},{label:"Risques de confidentialité",icon:lr},{label:"Erreurs de génération (hallucinations)",icon:vc},{label:"Données sensibles à ne pas partager",icon:Ho}],lesson:[{h:"Ce que l'IA fait bien",p:"Reformuler, résumer, traduire, brainstormer, générer du code de base, expliquer un concept. C'est un assistant — pas un oracle. Vérifiez toujours, surtout pour les chiffres, citations et faits précis."},{h:"Le risque de fuite",p:"Tout ce que vous tapez dans un outil grand public peut être stocké et potentiellement utilisé pour entraîner le modèle. N'y mettez jamais : identités agent, contrats, données financières non publiques, code propriétaire, secrets internes."},{h:"Hallucinations",p:"L'IA peut inventer une référence, une citation, un nom, un article de loi, en gardant un ton très assuré. Vérifiez toute affirmation factuelle dans une source officielle avant de l'utiliser."}],workshop:{type:"mixed",intro:"Analysez les prompts suivants : sont-ils sûrs à envoyer dans un outil d'IA grand public ?",questions:[{type:"prompt-sort",prompt:"Pour chaque prompt, indiquez s'il est acceptable ou s'il pose un problème de confidentialité.",items:[{id:"p1",text:"Reformule cet email pour qu'il soit plus diplomate : « Bonjour, pouvez-vous nous renvoyer le devis ? »",risk:!1},{id:"p2",text:"Voici le contrat signé avec le agent Renault, dont le numéro SIREN est 441639465. Résume-le-moi.",risk:!0},{id:"p3",text:"Donne-moi un plan en 5 points pour une présentation sur la cybersécurité.",risk:!1     <style>
      /* SDIS 04 logo — fixed in top-left, transparent background, on every view.
         Lives outside the React tree so it persists across welcome/dashboard/atelier/certificat. */
      .sdis-logo {
        position: fixed;
        top: 16px;
        left: 20px;
        width: 130px;
        height: auto;
        z-index: 50;
        background: transparent;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }
      /* Reserve space at the top of every React view so existing headers
         (Welcome banner, Dashboard "Bonjour", Atelier back button, Certificat…)
         never sit underneath the logo. Modals use position:fixed and are unaffected. */
      .pn-root { padding-top: 64px; }

      @media (max-width: 640px) {
        .sdis-logo { width: 96px; top: 12px; left: 14px; }
        .pn-root { padding-top: 50px; }
      }
      @media print {
        .sdis-logo { position: absolute; }
      }
